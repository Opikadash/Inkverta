<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator - Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <h1>Comic Translator Settings</h1>

      <div class="card">
        <label>
          Backend API URL
          <input id="apiUrl" type="url" placeholder="https://api.example.com" />
        </label>
        <p class="hint">Used by the extension to call OCR/Translate endpoints.</p>

        <label>
          Web App URL (optional)
          <input id="webAppUrl" type="url" placeholder="https://app.example.com" />
        </label>
        <p class="hint">Used by “Open Web App” in the popup.</p>

        <div class="row">
          <button id="save" class="primary">Save</button>
          <button id="test" class="secondary">Test Connection</button>
          <span id="status" class="status"></span>
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
