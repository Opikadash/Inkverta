services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: comic-translator-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      - DEEPL_API_KEY=${DEEPL_API_KEY}
      - UPLOAD_DIR=/app/uploads
      - LOG_LEVEL=info
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_temp:/app/temp
    networks:
      - comic-translator-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: comic-translator-frontend
    environment:
      - VITE_API_URL=http://localhost
    depends_on:
      - backend
    networks:
      - comic-translator-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: comic-translator-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - comic-translator-network
    restart: unless-stopped

volumes:
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  backend_temp:
    driver: local
  nginx_logs:
    driver: local

networks:
  comic-translator-network:
    driver: bridge
